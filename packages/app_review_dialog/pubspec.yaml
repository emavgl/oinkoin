name: app_review_dialog
description: A beautiful, localised in-app rating dialog for Flutter. Shows a star rating prompt with half-star granularity. Positive ratings invite a store review; lower ratings open a feedback email.
version: 1.0.0
repository: https://github.com/emavgl/app_review_dialog
issue_tracker: https://github.com/emavgl/app_review_dialog/issues

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  generate: true
